---
# =============================================================
# Playbook : Configuration serveur DHCP Linux
# Auteur   : Haroun Benadel — Stage NAFTAL 2025/2026
# =============================================================

- name: "Déploiement serveur DHCP — Sites NAFTAL"
  hosts: dhcp_servers
  become: true
  gather_facts: true

  vars:
    dhcp_subnet: "192.168.10.0"       # IP fictive
    dhcp_netmask: "255.255.255.0"
    dhcp_range_start: "192.168.10.100"
    dhcp_range_end: "192.168.10.200"
    dhcp_gateway: "192.168.10.1"
    dhcp_dns: "8.8.8.8"
    dhcp_lease_time: 86400

  tasks:

    - name: "Installer isc-dhcp-server"
      apt:
        name: isc-dhcp-server
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: "Installer dhcp-server (CentOS/RHEL)"
      yum:
        name: dhcp-server
        state: present
      when: ansible_os_family == "RedHat"

    - name: "Déployer configuration DHCP"
      template:
        src: dhcpd.conf.j2
        dest: /etc/dhcp/dhcpd.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart dhcp

    - name: "Activer et démarrer le service DHCP"
      systemd:
        name: isc-dhcp-server
        state: started
        enabled: true

    - name: "Vérifier que le service tourne"
      command: systemctl status isc-dhcp-server
      register: dhcp_status
      changed_when: false

    - name: "Afficher statut DHCP"
      debug:
        msg: "{{ dhcp_status.stdout_lines }}"

  handlers:
    - name: restart dhcp
      systemd:
        name: isc-dhcp-server
        state: restarted
